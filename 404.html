<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Ошибка 404</title>
    <link rel="stylesheet" href="404.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<div class="error-toast">
    Неизвестная ошибка
</div>
    <main class="error-page">

        <section class="error-content">

            <h1>ОШИБКА 404</h1>

            <p class="error-main-text">
                Вы вышли за пределы картографированных глубин
            </p>

            <p class="error-description">
                Возможно, течение унесло вас в неизведанный участок подводного мира,
                где ещё не зафиксированы ни существа, ни маршруты.
            </p>

            <p class="error-bottom-text">
                Попробуйте вернуться в известные глубины
            </p>

            <a href="index.html" class="return-btn">
                Вернуться на главную
            </a>

        </section>

    </main>

</body>

</html>
